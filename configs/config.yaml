data:
  raw_path: data/raw/dataset.csv
  processed_path: data/processed/processed.csv
  target_column: target
  test_size: 0.2
  random_state: 42

model:
  type: random_forest
  save_path: models/model.joblib
  parameters:
    n_estimators: 105
    max_depth: 11
    min_samples_split: 8
    min_samples_leaf: 3

training:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

mlflow:
  experiment_name: ml_pipeline
  tracking_uri: sqlite:///mlflow.db

tuning:
  n_trials: 30
  direction: maximize
  metric: f1
